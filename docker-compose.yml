version: "3.9"

services:
  # ─── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pfa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pfa_user
      POSTGRES_PASSWORD: pfa_password
      POSTGRES_DB: pfa_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pfa_user -d pfa_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pfa-network

  # ─── FastAPI Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pfa_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://pfa_user:pfa_password@postgres:5432/pfa_db
      # SQS queue URLs: leave empty in local dev (workers will skip gracefully).
      # In prod these are injected by the EC2 launch template from SSM.
      SQS_STATEMENT_UPLOADED_URL: ""
      SQS_STATEMENT_PARSED_URL: ""
      SQS_TRANSACTIONS_CATEGORIZED_URL: ""
      SQS_ANOMALIES_DETECTED_URL: ""
      SQS_REPORT_SCHEDULE_URL: ""
      SQS_REPORT_GENERATED_URL: ""
      SQS_SUBSCRIPTION_EVENTS_URL: ""
    # Override Dockerfile CMD for dev: single worker + auto-reload on code changes
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --log-level debug
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app   # live-mount source for hot-reload
    networks:
      - pfa-network

  # ─── Next.js Frontend ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pfa_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000   # browser-side URL (Docker port-forwarded)
    # Override Dockerfile CMD for dev: next dev for hot-reload + turbopack
    command: npm run dev
    depends_on:
      - backend
    volumes:
      - ./frontend:/app        # live-mount source for hot-reload
      - /app/node_modules      # preserve container node_modules (don't overwrite with host)
      - /app/.next             # preserve build cache between restarts
    networks:
      - pfa-network

# ─── Volumes ──────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local

# ─── Networks ─────────────────────────────────────────────────
networks:
  pfa-network:
    driver: bridge
